<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<script src="script.js" defer></script>
<title>Watch Panel</title>
</head>
<body>

<div id="panel" class="hidden">
    <img id="frame" src="frame.png">
    <img id="background" src="background.png">

    <div class="content">
        <div class="row">
            <span>Denar: <b id="cash">0</b>€</span>
            <span>Banka: <b id="bank">0</b>€</span>
        </div>
        <div class="row">
            <span>Služba: <b id="job">N/A</b></span>
            <span>Rank: <b id="rank">N/A</b></span>
        </div>
        <p> ID:  <span id="id">0</span></p>
    </div>

    <button id="closeBtn">X</button>
</div>

</body>
</html>
